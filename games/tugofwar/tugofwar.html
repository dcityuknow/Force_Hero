<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tug of War – SMIC GAME</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tug.css">
    <style>
        /* ── Wallet UI shared styles ── */
        .wallet-wrap {
            position: fixed;
            top: 12px;
            right: 14px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }
        .wallet-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .wallet-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 999px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: .05em;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            backdrop-filter: blur(6px);
        }
        .wallet-btn:hover { border-color: rgba(255,255,255,.6); }
        .wallet-btn.connected { border-color: #4ade80; background: rgba(0,0,0,.65); }
        .wallet-icon { font-size: 1rem; }
        .disconnect-btn {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 5px 11px;
            border: 2px solid rgba(248,113,113,.5);
            border-radius: 999px;
            background: rgba(0,0,0,.5);
            color: #f87171;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: .04em;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            backdrop-filter: blur(6px);
        }
        .disconnect-btn:hover { border-color: #f87171; background: rgba(248,113,113,.15); }
        .wallet-network {
            display: none;
            align-items: center;
            gap: 5px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(255,255,255,.7);
            padding-right: 4px;
        }
        .net-dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot-green  { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
        .dot-yellow { background: #facc15; box-shadow: 0 0 6px #facc15; }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Nút về lobby -->
        <button class="lobby-btn" onclick="goLobby()">🏠 LOBBY</button>

        <!-- WALLET CONNECT / DISCONNECT -->
        <div class="wallet-wrap" id="walletWrap">
            <div class="wallet-row">
                <button class="wallet-btn" id="walletBtn" onclick="connectWallet()">
                    <span class="wallet-icon">🦊</span>
                    <span id="walletBtnText">CONNECT WALLET</span>
                </button>
                <button class="disconnect-btn" id="disconnectBtn" onclick="disconnectWallet()">✕ DISCONNECT</button>
            </div>
            <div class="wallet-network" id="walletNetwork">
                <span class="net-dot" id="netDot"></span>
                <span id="netLabel">ARC Testnet</span>
            </div>
        </div>

        <div class="start-menu" id="startMenu">
            <h1 class="game-title">TUG OF WAR</h1>
            <p class="select-hint">CHOOSE MAP TO PLAY</p>
            <div class="map-selection">
                <div class="map-item" onclick="selectMap('../../assets/images/tugofwar/background1.png')">
                    <img src="../../assets/images/tugofwar/background1.png" alt="Map 1">
                    <span>Green steppe</span>
                </div>
                <div class="map-item" onclick="selectMap('../../assets/images/tugofwar/background2.png')">
                    <img src="../../assets/images/tugofwar/background2.png" alt="Map 2">
                    <span>Pharaoh's desert</span>
                </div>
                <div class="map-item" onclick="selectMap('../../assets/images/tugofwar/background3.png')">
                    <img src="../../assets/images/tugofwar/background3.png" alt="Map 3">
                    <span>Summer Beach</span>
                </div>
            </div>
        </div>

        <div class="team-menu hidden" id="teamMenu">
            <h1 class="game-title">CHOOSE YOUR TEAM</h1>
            <p class="select-hint">BOT WILL PLAY THE OPPOSITE TEAM</p>
            <div class="team-selection">
                <div class="team-box btn-red" onclick="selectTeam('left')">
                    <img src="../../assets/images/tugofwar/team_left.png" alt="Red Team" class="team-preview-img">
                    <h2>RED TEAM</h2>
                    <span>(LEFT SIDE)</span>
                </div>
                <div class="team-box btn-blue" onclick="selectTeam('right')">
                    <img src="../../assets/images/tugofwar/team_right.png" alt="Blue Team" class="team-preview-img">
                    <h2>BLUE TEAM</h2>
                    <span>(RIGHT SIDE)</span>
                </div>
            </div>
        </div>

        <canvas id="fireworksCanvas"></canvas>
        <div class="game-background" id="gameBg"></div>
        <button class="stop-btn" id="btnStop" onclick="backToMenu()">STOP GAME</button>

        <div class="audi-container hidden" id="audiContainer">
            <div class="level-indicator" id="levelIndicator">LEVEL: 1</div>
            <div class="arrow-chain" id="arrowChain"></div>
            <div class="time-bar-wrapper">
                <div class="time-bar-inner" id="timeBar"></div>
            </div>
            <p class="audi-hint">Nhập đúng chuỗi mũi tên và nhấn <span class="key-cap">SPACE</span></p>
        </div>

        <button class="control-btn" id="btnLeft"  onclick="handleVirtualPull('left')">TEAM LEFT PULL</button>
        <button class="control-btn" id="btnRight" onclick="handleVirtualPull('right')">TEAM RIGHT PULL</button>

        <div class="character-center" id="charCenter"></div>
        <div class="team team-left"  id="teamLeft"><div class="dust-effect"></div></div>
        <div class="team team-right" id="teamRight"><div class="dust-effect"></div></div>

        <div class="rope-container" id="ropeContainer">
            <img src="../../assets/images/tugofwar/rope.png" alt="Rope" class="rope">
            <img src="../../assets/images/tugofwar/flag.png" alt="Flag" class="flag">
        </div>

        <div class="overlay" id="victoryOverlay">
            <div class="overlay-content">
                <h2 id="winnerText">🎉 RED TEAM WINS!</h2>
                <button class="restart-btn" onclick="resetGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script src="../../js/wallet.js"></script>
    <script src="js/tug.js"></script>
    <script>
        function goLobby() {
            window.location.href = '../../index.html';
        }

        window.addEventListener('wheel', function(e) {
            if (e.ctrlKey) e.preventDefault();
        }, { passive: false });
        window.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        window.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
